<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Skylines Gallery</title>
    <link rel="stylesheet" href="./src/css/style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="page-shell">
        <header class="page-header">
            <h1>City Skylines Gallery</h1>
            <p>Dynamic Image Gallery Using Ajax and jQuery</p>
        </header>

        <section class="gallery-card">
            <div class="photo-stage">
                <img id="galleryImage" src="" alt="City skyline image">
            </div>

            <div class="button-row">
                <button id="prevBtn" type="button">Previous</button>
                <button id="updateBtn" type="button">Update List</button>
                <button id="nextBtn" type="button">Next</button>
            </div>
        </section>
    </div>

    <script src="./src/code/script.js"></script>
</body>
</html>
